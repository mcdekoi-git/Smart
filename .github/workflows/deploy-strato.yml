name: Deploy zu Strato

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Hochladen zu Strato per SFTP (nur Unterordner "deployed")
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.STRATO_SERVER }}
          username: ${{ secrets.STRATO_USERNAME }}
          password: ${{ secrets.STRATO_PASSWORD }}
          protocol: sftp
          port: 22
          local-dir: ./site/
          server-dir: /dach/deployed/
          
